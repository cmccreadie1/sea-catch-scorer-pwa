<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sea Score Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --p-dark: #0f172a; --blue: #0ea5e9; --grad: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); --card: #ffffff; --txt: #1e293b; --mut: #64748b; --brd: rgba(255,255,255,0.8); --input-bg: #ffffff; --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1); --picker-bg: #f8fafc; }
        body.dark-mode { --p-dark: #cbd5e1; --blue: #38bdf8; --grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: #1e293b; --txt: #f8fafc; --mut: #94a3b8; --brd: #334155; --input-bg: #0f172a; --picker-bg: #0f172a; }
        html { overscroll-behavior: none; }
        body { font-family: 'Inter', sans-serif; background: var(--grad); color: var(--txt); padding-bottom: 90px; min-height: 100vh; overflow-x: hidden; transition: 0.3s; }
        h1, h2, h3, h4, .btn { font-family: 'Poppins', sans-serif; }
        .inner-card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: var(--shadow-md); margin-bottom: 15px; border: 1px solid var(--brd); transition: 0.3s; }
        .splash-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #334155 100%); color: white; text-align: center; position: relative; }
        .theme-toggle-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .logo-svg { width: 140px; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)); margin-bottom: 25px; }
        .sonar-sweep { transform-origin: 100px 100px; animation: spin 4s linear infinite; } @keyframes spin { 100% { transform: rotate(360deg); } }
        .picker-outer-wrapper { background: var(--card); padding: 12px; border-radius: 20px; border: 2px solid var(--blue); margin-bottom: 15px; }
        .weight-picker-container { display: flex; justify-content: center; align-items: center; background: var(--picker-bg); border-radius: 14px; height: 160px; position: relative; overflow: hidden; box-shadow: inset 0 2px 8px rgba(0,0,0,0.15); }
        .picker-column { flex: 1; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; text-align: center; -ms-overflow-style: none; scrollbar-width: none; z-index: 2; overscroll-behavior-y: contain; }
        .picker-column::-webkit-scrollbar { display: none; }
        .picker-item { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 600; color: #94a3b8; scroll-snap-align: center; transition: 0.2s; }
        .picker-item.selected { color: var(--blue); font-size: 2.1rem; font-weight: 800; }
        .picker-highlight { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; height: 50px; border-top: 2px solid var(--blue); border-bottom: 2px solid var(--blue); pointer-events: none; z-index: 1; }
        .btn-record-action { min-height: 80px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .app-page { display: none; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; }
        .live-score-box { border: 4px solid var(--blue); background-color: var(--card); border-radius: 24px; padding: 15px; text-align: center; margin-bottom: 20px; }
        .live-score-value { font-size: 4rem; font-weight: 800; color: var(--blue); line-height: 1; }
        .fish-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid var(--brd); }
        .table-custom td { background: var(--card); padding: 12px; border-radius: 16px; border: 1px solid var(--brd); margin-bottom: 8px; display: block; width: 100%; }
        .icon-spin { animation: spin 1s linear infinite; }
        .dark-mode .text-dark { color: #fff !important; }
    </style>
</head>
<body>

    <div class="toast-container position-fixed top-0 end-0 p-3 mt-4" style="z-index: 2000;">
        <div id="appToast" class="toast text-bg-success border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true"><div class="d-flex"><div class="toast-body fw-bold fs-6" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>
    </div>

    <div id="splashScreen" class="splash-screen">
        <button class="theme-toggle-btn" onclick="window.toggleDarkMode()"><i class="bi bi-moon-stars-fill"></i></button>
        <svg class="logo-svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="none" stroke="#0ea5e9" stroke-width="2"/><g class="sonar-sweep"><path d="M 100,100 L 100,5 A 95 95 0 0 1 195,100 Z" fill="#0ea5e9" opacity="0.3"/></g><circle cx="100" cy="100" r="4" fill="#ef4444"/></svg>
        <h1 class="display-3 fw-bold mb-0">Sea Score</h1>
        <p class="text-uppercase small mb-5">Version 160.0 - Full Pro Features</p>
        <div class="d-grid gap-3 col-10 mx-auto">
            <button class="btn btn-light btn-lg fw-bold py-3" onclick="window.startFishing()">Start Session</button>
            <div class="row g-2">
                <div class="col-6"><button class="btn btn-outline-light w-100 py-3" onclick="window.loadSaved()" data-bs-toggle="modal" data-bs-target="#savedModal">History</button></div>
                <div class="col-6"><button class="btn btn-outline-light w-100 py-3" onclick="window.loadStats()" data-bs-toggle="modal" data-bs-target="#statsModal">My Stats</button></div>
            </div>
        </div>
        <button class="btn btn-link text-white-50 mt-4 small" onclick="window.location.reload()">Check for Latest Version</button>
    </div>

    <div id="registrationPage" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-3"><h3 class="fw-bold m-0 text-primary">Session Setup</h3><button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="window.location.reload()">Back</button></div>
        <div class="inner-card">
            <input type="text" id="anglerName" class="form-control mb-2" placeholder="Angler Name">
            <div class="row g-2"><div class="col-6"><input type="date" id="compDate" class="form-control"></div><div class="col-6"><input type="text" id="venueInput" class="form-control border-primary" placeholder="Venue Name"></div></div>
        </div>
        <div class="inner-card">
            <div class="d-flex justify-content-between align-items-center mb-2"><label class="small fw-bold text-primary">Live Conditions</label><button class="btn btn-sm btn-primary py-0 px-2" onclick="window.fetchWeather()"><i class="bi bi-cloud-download"></i> Fetch</button></div>
            <div class="row g-1 mb-2"><div class="col-4"><input type="text" id="weathIn" class="form-control form-control-sm text-center" placeholder="Weather"></div><div class="col-4"><input type="text" id="windIn" class="form-control form-control-sm text-center" placeholder="Wind"></div><div class="col-4"><select id="tideIn" class="form-select form-select-sm"><option value="">Tide...</option><option>Flood</option><option>High</option><option>Ebb</option><option>Low</option></select></div></div>
            <div id="visualTide" style="display:none;" class="mt-2"></div>
        </div>
        <div class="inner-card">
            <label class="small fw-bold text-primary">Scoring Rules</label>
            <select id="scoreMethod" class="form-select" onchange="window.handleMethodChange()"><option value="measure_points">Length + 10 Pts</option><option value="length_only">Total Length Only</option><option value="species_hunt">Species Hunt</option><option value="weight">Total Weight</option></select>
        </div>
        <div class="inner-card">
            <div class="form-check form-switch mb-2"><input class="form-check-input" type="checkbox" id="isComp" onchange="window.toggleComp()"><label class="form-check-label fw-bold small">Competition Mode</label></div>
            <div class="row g-2"><div class="col-6"><select id="zoneIn" class="form-select" disabled><option value="">Zone</option><option>1</option><option>2</option><option>Red</option><option>Blue</option></select></div><div class="col-6"><select id="pegIn" class="form-select" disabled><option value="">Peg</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div></div>
        </div>
        <button class="btn btn-primary w-100 py-3 fw-bold shadow" onclick="window.beginFishing()">Begin Session</button>
    </div>

    <div id="fishingPage" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-4"><h4 class="fw-bold text-primary m-0">Live Catch</h4><button class="btn btn-sm btn-outline-danger px-3 rounded-pill" onclick="window.confirmQuit()">Quit</button></div>
        <div class="inner-card">
            <input type="file" id="camIn" accept="image/*" capture="environment" style="display:none" onchange="window.handleCam()">
            <select id="spIn" class="form-select form-select-lg mb-3"></select>
            <div id="lenPick" class="picker-outer-wrapper"><div class="picker-instruction">Swipe Wheels to Set Length</div><div class="weight-picker-container"><div class="picker-highlight"></div><div id="pL1" class="picker-column" onscroll="window.updPick('pL1')"></div><div id="pL2" class="picker-column" onscroll="window.updPick('pL2')"></div><div class="picker-label-text" style="left:20%">M</div><div class="picker-label-text" style="right:20%">CM</div></div></div>
            <div id="wtPick" class="picker-outer-wrapper" style="display:none;"><div class="picker-instruction">Swipe Wheels to Set Weight</div><div class="weight-picker-container"><div class="picker-highlight"></div><div id="pW1" class="picker-column" onscroll="window.updPick('pW1')"></div><div id="pW2" class="picker-column" onscroll="window.updPick('pW2')"></div><div class="picker-label-text" style="left:20%">KG</div><div class="picker-label-text" style="right:20%">G</div></div></div>
            <div class="row g-2 pt-2 border-top"><div class="col-6"><button class="btn btn-primary btn-record-action w-100 shadow-sm" onclick="window.addFish(false)"><i class="bi bi-check-circle fs-3 mb-1"></i>Record</button></div><div class="col-6"><button class="btn btn-primary btn-record-action w-100 shadow-sm" onclick="window.triggerCam()"><i class="bi bi-camera-fill fs-3 mb-1"></i>With Photo</button></div></div>
        </div>
        <div class="live-score-box"><div class="live-score-value" id="liveScore">0</div><small class="text-muted fw-bold">SESSION TOTAL</small></div>
        <div id="logArea"></div>
        <button class="btn btn-danger btn-lg w-100 mt-4 py-3 shadow" onclick="window.finishSession()">Finish Session</button>
    </div>

    <div id="tallyPage" class="app-page">
        <div class="inner-card text-center py-4"><h2 class="text-primary fw-bold">Session Complete</h2><div id="tAng" class="fw-bold fs-4"></div><div class="text-muted"><span id="tDat"></span> • <span id="tVen"></span></div></div>
        <div class="live-score-box"><div id="tPts" class="live-score-value">0</div></div>
        <div class="inner-card mt-3"><label class="form-label small fw-bold">Session Notes</label><textarea id="tNotes" class="form-control" rows="3" placeholder="Add notes here..."></textarea></div>
        <div class="d-grid gap-3 mt-4"><button class="btn btn-whatsapp text-white py-3 shadow-sm" style="background:#25D366;" onclick="window.share('live')"><i class="bi bi-share me-2"></i>Share Scorecard</button><button class="btn btn-secondary btn-lg py-3 shadow-sm" onclick="window.location.reload()">Home</button></div>
    </div>

    <div class="modal fade" id="statsModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0"><div class="modal-header border-0"><h5 class="modal-title fw-bold">My Stats</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body bg-light" id="statsBody"></div></div></div></div>
    <div class="modal fade" id="savedModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-scrollable"><div class="modal-content border-0"><div class="modal-header border-0 pb-0"><h5 class="modal-title fw-bold">History</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body bg-light" id="historyBody"></div></div></div></div>
    <div class="modal fade" id="imageModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 bg-transparent"><div class="modal-body p-0 text-center"><img id="fullSizeImg" src="" style="max-width:100%; border-radius:15px; border:3px solid white;"><button class="btn btn-sm btn-light mt-2 px-4" data-bs-dismiss="modal">Close</button></div></div></div></div>

    <script>
        const KEY = "db7f2afb64d943719e0203116260103";
        const species=["Cod","Whiting","Dab","Flounder","Plaice","Dogfish","Bass","Coalfish","Pollack","Ray","Wrasse","Other"];
        let fishData=[], method='measure_points', curAng='', curVen='', curDat='', startTime='', theme='light';
        let weightUnit='metric', fetchedTides=[], weatherInfo='', windInfo='', curSavedKey='';

        window.startFishing = () => { document.getElementById('compDate').value = new Date().toISOString().split('T')[0]; PageManager.show('registrationPage'); };
        window.resetAppToHome = () => window.location.reload();
        window.toggleComp = () => { const c = document.getElementById('isComp').checked; document.getElementById('zoneIn').disabled=!c; document.getElementById('pegIn').disabled=!c; };
        
        window.fetchWeather = async () => {
            const v = document.getElementById('venueInput').value.trim(); if(!v) return window.showAppToast("Enter Venue Name!", true);
            const btn = document.querySelector('button[onclick="window.fetchWeather()"]'); btn.innerHTML='<i class="bi bi-hourglass-split icon-spin"></i>'; btn.disabled=true;
            try {
                const res = await fetch(`https://api.weatherapi.com/v1/forecast.json?key=${KEY}&q=${encodeURIComponent(v)}&days=1&tides=yes`).then(r=>r.json());
                if(res.error) throw new Error(res.error.message);
                document.getElementById('weathIn').value = res.current.condition.text;
                document.getElementById('windIn').value = `${res.current.wind_dir} ${res.current.wind_mph}mph`;
                if(res.forecast.forecastday[0].day.tides) {
                    const tides = res.forecast.forecastday[0].day.tides[0].tide;
                    fetchedTides = tides.map(t => `${t.tide_type}: ${t.tide_time.split(' ')[1]} (${t.tide_height_mt}m)`);
                    let h = '<div class="d-flex justify-content-between align-items-center bg-light p-2 rounded border border-primary small text-dark">';
                    tides.forEach(t => h += `<div><strong>${t.tide_type}</strong><br>${t.tide_time.split(' ')[1]}</div>`);
                    document.getElementById('visualTide').innerHTML = h + '</div>'; document.getElementById('visualTide').style.display='block';
                }
                window.showAppToast("Data Fetched!");
            } catch(e) { window.showAppToast(e.message, true); }
            btn.innerHTML='Fetch'; btn.disabled=false;
        };

        window.beginFishing = () => {
            curAng=document.getElementById('anglerName').value; curVen=document.getElementById('venueInput').value; curDat=document.getElementById('compDate').value;
            method=document.getElementById('scoreMethod').value;
            if(!curAng||!curVen) return alert("Fill Name and Venue!");
            startTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            window.populatePickers(); PageManager.show('fishingPage');
        };

        window.populatePickers = () => {
            const sp = document.getElementById('spIn'); sp.innerHTML=''; species.forEach(s => sp.add(new Option(s,s)));
            const pad = '<div style="height:55px"></div>';
            let hL1=pad, hL2=pad, hW1=pad, hW2=pad;
            for(let i=0;i<=5;i++) hL1+=`<div class="picker-item" data-val="${i}">${i}</div>`;
            for(let i=0;i<=99;i++) hL2+=`<div class="picker-item" data-val="${i}">${i.toString().padStart(2,'0')}</div>`;
            for(let i=0;i<=50;i++) hW1+=`<div class="picker-item" data-val="${i}">${i}</div>`;
            for(let i=0;i<=950;i+=50) hW2+=`<div class="picker-item" data-val="${i/1000}">${(i/1000).toFixed(3).split('.')[1]}</div>`;
            document.getElementById('pL1').innerHTML=hL1+pad; document.getElementById('pL2').innerHTML=hL2+pad;
            document.getElementById('pW1').innerHTML=hW1+pad; document.getElementById('pW2').innerHTML=hW2+pad;
            setTimeout(() => { ['pL1','pL2','pW1','pW2'].forEach(id => window.updPick(id)); }, 100);
            document.getElementById('wtPick').style.display = method==='weight'?'block':'none';
            document.getElementById('lenPick').style.display = method!=='weight'?'block':'none';
        };

        window.updPick = (id) => {
            const el = document.getElementById(id); if(!el) return;
            const items = el.querySelectorAll('.picker-item'); const mid = el.scrollTop + 80;
            items.forEach(it => { if(it.offsetTop <= mid && (it.offsetTop+50) >= mid) it.classList.add('selected'); else it.classList.remove('selected'); });
        };

        window.addFish = (photo = null) => {
            const s = document.getElementById('spIn').value; let val = 0, disp = '';
            if(method==='weight') {
                const v1 = parseFloat(document.querySelector('#pW1 .selected').dataset.val);
                const v2 = parseFloat(document.querySelector('#pW2 .selected').dataset.val);
                val = v1+v2; disp = val.toFixed(3)+'kg';
            } else {
                const v1 = parseFloat(document.querySelector('#pL1 .selected').dataset.val);
                const v2 = parseFloat(document.querySelector('#pL2 .selected').dataset.val);
                val = (v1*100)+v2; disp = val+'cm';
            }
            fishData.push({s, val, disp, photo, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
            window.updLog();
        };

        window.triggerCam = () => document.getElementById('camIn').click();
        window.handleCam = () => {
            const fr = new FileReader(); fr.onload = (e) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    const MAX = 400; let w=img.width, h=img.height;
                    if(w>h) { if(w>MAX){h*=MAX/w; w=MAX;} } else { if(h>MAX){w*=MAX/h; h=MAX;} }
                    canvas.width=w; canvas.height=h; ctx.drawImage(img,0,0,w,h);
                    window.addFish(canvas.toDataURL('image/jpeg', 0.5));
                }; img.src = e.target.result;
            }; fr.readAsDataURL(document.getElementById('camIn').files[0]);
        };

        window.updLog = () => {
            let pts = 0;
            if(method==='weight') pts = fishData.reduce((a,b)=>a+b.val,0).toFixed(3)+' kg';
            else if(method==='species_hunt') {
                const c={}; pts=0; fishData.forEach(f => { c[f.s]=(c[f.s]||0)+1; const n=c[f.s]; pts+=(n===1?30:n===2?30:n===3?40:1); }); pts += ' pts';
            } else {
                let sum = fishData.reduce((a,b)=>a+b.val,0);
                pts = method==='length_only' ? sum : sum + (fishData.length*10); pts += ' pts';
            }
            document.getElementById('liveScore').innerText = pts;
            document.getElementById('logArea').innerHTML = fishData.slice().reverse().map((f,i) => `
                <div class="inner-card d-flex justify-content-between align-items-center mb-2 p-2">
                    <div><strong>${f.s}</strong><br><small class="text-primary fw-bold">${f.disp}</small> <small class="text-muted ms-2">${f.time}</small></div>
                    ${f.photo ? `<img src="${f.photo}" class="fish-thumb" onclick="window.viewImg('${f.photo}')">` : ''}
                    <button class="btn btn-sm text-danger" onclick="fishData.splice(${fishData.length-1-i},1); window.updLog();"><i class="bi bi-trash"></i></button>
                </div>`).join('');
        };

        window.finishSession = () => {
            if(!confirm("End Session?")) return;
            const end = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const weath = document.getElementById('weathIn').value; const wind = document.getElementById('windIn').value; const tide = document.getElementById('tideIn').value;
            const key = 'scorecard_' + Date.now();
            const record = { curAng, curVen, curDat, method, fishData, startTime, end, weath, wind, tide, tides: fetchedTides, notes: '' };
            localStorage.setItem(key, JSON.stringify(record));
            curSavedKey = key;
            document.getElementById('tAng').innerText = curAng; document.getElementById('tVen').innerText = curVen; document.getElementById('tDat').innerText = new Date(curDat).toLocaleDateString('en-GB');
            document.getElementById('tPts').innerText = document.getElementById('liveScore').innerText;
            PageManager.show('tallyPage');
            document.getElementById('tNotes').oninput = (e) => { record.notes = e.target.value; localStorage.setItem(key, JSON.stringify(record)); };
        };

        window.loadSaved = () => {
            const ks = Object.keys(localStorage).filter(k=>k.startsWith('scorecard_')).sort().reverse();
            document.getElementById('historyBody').innerHTML = ks.map(k => {
                const d = JSON.parse(localStorage.getItem(k));
                return `<div class="inner-card mb-2" style="cursor:pointer" onclick="window.viewRec('${k}')"><div class="d-flex justify-content-between"><div><strong>${d.curVen}</strong><br><small>${new Date(d.curDat).toLocaleDateString('en-GB')}</small></div><button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); localStorage.removeItem('${k}'); window.loadSaved();"><i class="bi bi-trash"></i></button></div></div>`;
            }).join('');
            document.getElementById('savedScorecardsList').style.display='block'; document.getElementById('fullScorecardView').style.display='none';
        };

        window.viewRec = (k) => {
            curSavedKey = k; const d = JSON.parse(localStorage.getItem(k));
            document.getElementById('saved_view_angler').innerText = d.curAng; document.getElementById('saved_view_venue').innerText = d.curVen; document.getElementById('saved_view_date').innerText = new Date(d.curDat).toLocaleDateString('en-GB');
            document.getElementById('saved_view_points').innerText = window.calcPts(d);
            document.getElementById('saved_view_breakdown').innerHTML = d.fishData.map(f => `<div class="d-flex justify-content-between border-bottom py-1 small"><span>${f.s}</span><span>${f.disp}</span></div>`).join('');
            document.getElementById('saved_view_notes_container').innerHTML = `<div class="mt-3 small p-2 bg-white text-dark rounded border"><strong>System Data:</strong><br>Time: ${d.startTime}-${d.end}<br>Weather: ${d.weath}, ${d.wind}<br>Tides: ${d.tides.join(' | ')}<br><hr><strong>Notes:</strong><br>${d.notes}</div>`;
            document.getElementById('savedScorecardsList').style.display='none'; document.getElementById('fullScorecardView').style.display='block';
        };

        window.calcPts = (d) => {
            if(d.method==='weight') return d.fishData.reduce((a,b)=>a+b.val,0).toFixed(3)+' kg';
            let sum = d.fishData.reduce((a,b)=>a+b.val,0); return (d.method==='length_only' ? sum : sum + (d.fishData.length*10)) + ' pts';
        };

        window.toggleDarkMode = () => { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light'); };
        window.viewImg = (s) => { document.getElementById('fullSizeImg').src=s; new bootstrap.Modal(document.getElementById('imageModal')).show(); };
        window.showAppToast = (m, e=false) => { const t = document.getElementById('appToast'); document.getElementById('toastMessage').innerText=m; t.className = e?'toast text-bg-warning border-0':'toast text-bg-success border-0'; new bootstrap.Toast(t).show(); };

        window.exportToCSV = () => {
            const ks = Object.keys(localStorage).filter(k=>k.startsWith('scorecard_')); if(!ks.length) return;
            let csv = "Date,Venue,Angler,Species,Value,Time,Notes\n";
            ks.forEach(k => {
                const d = JSON.parse(localStorage.getItem(k));
                d.fishData.forEach(f => csv += `${d.curDat},${d.curVen},${d.curAng},${f.s},${f.disp},${f.time},"${d.notes}"\n`);
            });
            const blob = new Blob([csv], {type:'text/csv'}); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download="SeaScore_Export.csv"; a.click();
        };

        window.loadStats = () => {
            const ks = Object.keys(localStorage).filter(k=>k.startsWith('scorecard_'));
            let fCount=0, maxL=0, maxW=0;
            ks.forEach(k => { const d = JSON.parse(localStorage.getItem(k)); fCount+=d.fishData.length; d.fishData.forEach(f => { if(d.method==='weight'){if(f.val>maxW)maxW=f.val;} else {if(f.val>maxL)maxL=f.val;} }); });
            document.getElementById('statsBody').innerHTML = `<div class="stat-card mb-2"><small>Total Sessions</small><strong>${ks.length}</strong></div><div class="stat-card mb-2"><small>Total Fish</small><strong>${fCount}</strong></div><div class="stat-card mb-2"><small>Max Length</small><strong>${maxL}cm</strong></div><div class="stat-card mb-2"><small>Max Weight</small><strong>${maxW.toFixed(3)}kg</strong></div>`;
        };

        window.share = async (id) => {
            const el = document.getElementById(id==='live'?'tallyPage':'fullScorecardView');
            const btns = el.querySelectorAll('button'); btns.forEach(b=>b.style.display='none');
            const canv = await html2canvas(el, {backgroundColor:document.body.classList.contains('dark-mode')?'#1e293b':'#f1f5f9'});
            btns.forEach(b=>b.style.display='inline-block');
            canv.toBlob(blob => {
                const file = new File([blob], "seascore.png", {type:"image/png"});
                if(navigator.canShare && navigator.canShare({files:[file]})) navigator.share({files:[file]});
                else { const a=document.createElement('a'); a.href=canv.toDataURL(); a.download="scorecard.png"; a.click(); }
            });
        };

        document.addEventListener('DOMContentLoaded', () => { if(localStorage.getItem('theme')==='dark') window.toggleDarkMode(); });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
