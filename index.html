<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sea Score Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --p-dark: #0f172a; --blue: #0ea5e9; --grad: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); --card: #fff; --txt: #1e293b; --mut: #64748b; --brd: rgba(255,255,255,0.8); }
        body.dark-mode { --p-dark: #cbd5e1; --blue: #38bdf8; --grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: #1e293b; --txt: #f8fafc; --mut: #94a3b8; --brd: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--grad); color: var(--txt); padding-bottom: 80px; min-height: 100vh; overscroll-behavior: none; transition: 0.3s; }
        .inner-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--brd); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .splash-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; color: #fff; text-align: center; }
        .logo-svg { width: 140px; margin-bottom: 20px; }
        .app-page { display: none; max-width: 600px; margin: 0 auto; padding: 15px; }
        .live-score-box { border: 4px solid var(--blue); border-radius: 24px; padding: 15px; text-align: center; margin-bottom: 20px; background: var(--card); }
        .live-score-val { font-size: 4rem; font-weight: 800; color: var(--blue); line-height: 1; }
        .table-custom td { background: var(--card); border-radius: 15px; padding: 12px; border: 1px solid var(--brd); }
        .tide-row { display: flex; justify-content: space-between; background: rgba(14, 165, 233, 0.1); padding: 8px 12px; border-radius: 10px; margin-top: 5px; font-size: 0.8rem; border: 1px solid var(--blue); }
        .icon-spin { animation: spin 1s linear infinite; } @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splashScreen" class="splash-screen">
        <svg class="logo-svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="none" stroke="#0ea5e9" stroke-width="2"/><path d="M 40,100 Q 100,40 160,100 Q 100,160 40,100" fill="#0ea5e9" opacity="0.3"/><circle cx="100" cy="100" r="10" fill="#ef4444"/></svg>
        <h1 class="display-4 fw-bold">Sea Score</h1>
        <p class="opacity-50">Version 159.0 - Open Tides</p>
        <div class="d-grid gap-3 col-10 mx-auto mt-4">
            <button class="btn btn-light btn-lg fw-bold py-3" onclick="window.startFishing()">Start Session</button>
            <button class="btn btn-outline-light py-3" onclick="window.loadHistory()" data-bs-toggle="modal" data-bs-target="#savedModal">History</button>
        </div>
        <button class="btn btn-link text-white-50 mt-4" onclick="window.location.reload()">Check for Latest Version</button>
    </div>

    <div id="registrationPage" class="app-page">
        <div class="d-flex justify-content-between mb-3 align-items-center"><h3>Session Setup</h3><button class="btn btn-sm btn-secondary" onclick="window.location.reload()">Back</button></div>
        <div class="inner-card">
            <label class="small fw-bold">Angler & Venue</label>
            <input type="text" id="anglerName" class="form-control mb-2" placeholder="Angler Name">
            <input type="text" id="venueInput" class="form-control" placeholder="Venue (e.g. Arbroath)">
        </div>
        <div class="inner-card">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="small fw-bold">Conditions (Free Auto-Fill)</label>
                <button class="btn btn-sm btn-primary" id="btnFetch" onclick="window.getFreeData()">Fetch</button>
            </div>
            <div class="row g-2">
                <div class="col-6"><input type="text" id="weatherOut" class="form-control form-control-sm" placeholder="Weather"></div>
                <div class="col-6"><input type="text" id="windOut" class="form-control form-control-sm" placeholder="Wind"></div>
            </div>
            <div id="tideDisplay" class="mt-2"></div>
        </div>
        <div class="inner-card">
            <label class="small fw-bold">Scoring</label>
            <select id="scoreMethod" class="form-select"><option value="length">Total Length</option><option value="points">Length + 10 Pts</option></select>
        </div>
        <button class="btn btn-primary w-100 py-3 fw-bold" onclick="window.beginSession()">Begin Fishing</button>
    </div>

    <div id="fishingPage" class="app-page">
        <div class="d-flex justify-content-between mb-3 align-items-center"><h4>Live Session</h4><button class="btn btn-sm btn-danger" onclick="window.location.reload()">Quit</button></div>
        <div class="inner-card">
            <select id="fishSpecies" class="form-select mb-3"><option>Cod</option><option>Whiting</option><option>Huss</option><option>Ray</option><option>Bass</option><option>Other</option></select>
            <input type="number" id="fishLength" class="form-control mb-3" placeholder="Length (cm)">
            <button class="btn btn-primary w-100 py-3" onclick="window.addFish()">Record Catch</button>
        </div>
        <div class="live-score-box"><div class="live-score-val" id="totalScore">0</div><small>Current Total</small></div>
        <div id="catchLog"></div>
        <button class="btn btn-success w-100 py-3 mt-4" onclick="window.finishSession()">Finish & Save</button>
    </div>

    <script>
        const API_KEY = "db7f2afb64d943719e0203116260103";
        let sessionData = { fish: [], weather: '', wind: '', tides: '' };

        window.startFishing = () => { document.getElementById('splashScreen').style.display='none'; document.getElementById('registrationPage').style.display='block'; };

        window.getFreeData = async () => {
            const v = document.getElementById('venueInput').value;
            const btn = document.getElementById('btnFetch');
            if(!v) return alert("Enter Venue");
            btn.innerHTML = '<i class="bi bi-arrow-clockwise icon-spin"></i>';
            
            try {
                // 1. Get Lat/Lon from WeatherAPI
                const geo = await fetch(`https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${v}`).then(r=>r.json());
                const lat = geo.location.lat; const lon = geo.location.lon;
                
                document.getElementById('weatherOut').value = geo.current.condition.text;
                document.getElementById('windOut').value = `${geo.current.wind_mph}mph ${geo.current.wind_dir}`;

                // 2. Get Free Tides from Open-Meteo (Marine)
                const tide = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&daily=tide_amplitude&timezone=auto`).then(r=>r.json());
                
                // Open-Meteo doesn't give precise times for free, so we use a simplified "Daily Range"
                if(tide.daily) {
                    const range = tide.daily.tide_amplitude[0];
                    const msg = `Coastal Area: Max Tide Range today ${range}m`;
                    document.getElementById('tideDisplay').innerHTML = `<div class="tide-row"><span>${msg}</span></div>`;
                    sessionData.tides = msg;
                }
            } catch(e) { alert("Fetch failed. Enter manually."); }
            btn.innerHTML = 'Fetch';
        };

        window.addFish = () => {
            const s = document.getElementById('fishSpecies').value;
            const l = document.getElementById('fishLength').value;
            if(!l) return;
            sessionData.fish.push({s, l: parseInt(l)});
            window.updateUI();
        };

        window.updateUI = () => {
            let score = sessionData.fish.reduce((a, b) => a + b.l, 0);
            document.getElementById('totalScore').innerText = score;
            document.getElementById('catchLog').innerHTML = sessionData.fish.map(f => `<div class="inner-card d-flex justify-content-between"><strong>${f.s}</strong><span>${f.l}cm</span></div>`).join('');
        };

        window.beginSession = () => {
            if(!document.getElementById('anglerName').value) return alert("Enter Name");
            sessionData.weather = document.getElementById('weatherOut').value;
            sessionData.wind = document.getElementById('windOut').value;
            document.getElementById('registrationPage').style.display='none';
            document.getElementById('fishingPage').style.display='block';
        };

        window.finishSession = () => {
            const key = 'scorecard_' + Date.now();
            localStorage.setItem(key, JSON.stringify(sessionData));
            alert("Saved to History!");
            window.location.reload();
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
