<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sea Score Pro</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-dark: #0f172a; 
            --app-blue: #0ea5e9; 
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(255,255,255,0.8);
            --input-bg: #ffffff;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --picker-bg: #f8fafc;
            --modal-bg: #f8f9fa;
        }

        body.dark-mode {
            --primary-dark: #cbd5e1; 
            --app-blue: #38bdf8; 
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
            --picker-bg: #0f172a;
            --modal-bg: #0f172a;
        }

        html { overscroll-behavior: none; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-gradient); color: var(--text-main); 
            padding-bottom: 90px; min-height: 100vh; overflow-x: hidden; overscroll-behavior: none; 
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        h1, h2, h3, h4, .btn, .modal-title { font-family: 'Poppins', sans-serif; }

        .dark-mode .text-dark { color: #f8fafc !important; }
        .dark-mode .text-primary { color: var(--app-blue) !important; }
        .dark-mode .bg-light { background-color: #0f172a !important; }
        .dark-mode .form-control, .dark-mode .form-select {
            background-color: var(--input-bg); color: var(--text-main); border-color: var(--border-color);
        }
        .dark-mode .form-control:focus, .dark-mode .form-select:focus {
            background-color: var(--input-bg); color: var(--text-main); border-color: var(--app-blue);
        }
        .dark-mode .modal-content { background-color: var(--modal-bg); border-color: var(--border-color); }
        .dark-mode .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
        .dark-mode .table-custom td { background-color: var(--card-bg); border-color: var(--border-color); color: var(--text-main); }
        
        /* --- DRUM PICKER --- */
        .picker-outer-wrapper {
            background: var(--card-bg); padding: 15px; border-radius: 24px; border: 2px solid var(--app-blue);
            margin-bottom: 20px; box-shadow: var(--shadow-lg); transition: background 0.3s ease;
        }
        .picker-instruction {
            text-align: center; font-size: 0.75rem; font-weight: 800; color: var(--app-blue);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
        }
        .weight-picker-container {
            display: flex; justify-content: center; align-items: center; background: var(--picker-bg);
            border-radius: 16px; height: 180px; position: relative; overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2); transition: background 0.3s ease;
        }
        .picker-column {
            flex: 1; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory;
            text-align: center; -ms-overflow-style: none; scrollbar-width: none;
            z-index: 2; overscroll-behavior-y: contain; user-select: none; touch-action: pan-y;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        .picker-item {
            height: 50px; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 600; color: #94a3b8; scroll-snap-align: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .picker-item.selected { color: var(--app-blue); font-size: 2.2rem; font-weight: 800; }
        .picker-highlight {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; height: 54px; background: rgba(14, 165, 233, 0.08);
            border-top: 2px solid var(--app-blue); border-bottom: 2px solid var(--app-blue);
            pointer-events: none; z-index: 1; border-radius: 12px;
        }
        .picker-label-text {
            font-size: 0.8rem; font-weight: 900; color: var(--app-blue);
            position: absolute; bottom: 8px; text-transform: uppercase;
        }

        .btn-record-action {
            white-space: normal !important; line-height: 1.1 !important; font-size: 0.85rem !important;
            min-height: 90px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 12px !important; border-radius: 20px;
        }

        .app-page { display: none; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px 15px 40px 15px; }
        .inner-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: var(--shadow-md); margin-bottom: 20px; border: 1px solid var(--border-color); transition: background 0.3s ease; }

        .splash-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #334155 100%); color: white;
            text-align: center; padding: 20px; position: relative;
        }
        .theme-toggle-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(5px); }
        .logo-svg { width: 160px; height: 160px; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)); margin-bottom: 30px; }
        .sonar-sweep { transform-origin: 100px 100px; animation: spin 4s linear infinite; }
        .blinker { animation: blink 1s step-end infinite; }
        .target-bracket { animation: pulseBracket 2s infinite alternate; transform-origin: 100px 100px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulseBracket { 0% { opacity: 0.3; transform: scale(0.96); } 100% { opacity: 1; transform: scale(1.02); } }
        @keyframes subtleSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .icon-spin { animation: subtleSpin 1s linear infinite; }

        .live-score-box { border: 4px solid var(--app-blue); background-color: var(--card-bg); border-radius: 24px; padding: 20px; text-align: center; margin-bottom: 25px; box-shadow: var(--shadow-lg); transition: background 0.3s ease; }
        .live-score-value { font-size: 4.5rem; font-weight: 800; color: var(--app-blue); line-height: 1; }
        .fish-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; flex-shrink: 0; cursor: pointer; border: 2px solid var(--border-color); box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .table-custom td { background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--border-color); box-shadow: var(--shadow-md); }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px 10px; border-radius: 16px; text-align: center; border: 1px solid var(--border-color); box-shadow: var(--shadow-md); transition: background 0.3s ease; }
        .stat-card small { display: block; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
        .stat-card strong { font-size: 1.2rem; color: var(--text-main); font-weight: 800; }
        
        @keyframes slideFlash { 0% { background-color: #dcfce7; transform: translateY(-10px); } 100% { background-color: var(--card-bg); } }
        .new-catch-anim { animation: slideFlash 1.5s ease-out; }
    </style>
</head>
<body>

            <line x1="100" y1="5" x2="100" y2="195" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>

            <line x1="100" y1="150" x2="100" y2="138" stroke="#38bdf8" stroke-width="2" opacity="0.9"/>
            <line x1="135" y1="150" x2="135" y2="142" stroke="#38bdf8" stroke-width="2" opacity="0.9"/>

        </svg>

        <h1 class="display-3 fw-bold mb-0">Sea Score</h1>
        <p class="text-uppercase tracking-widest opacity-50 small mb-5">Version 163.0 - Stabilized Weather</p>
        
        <div class="d-grid gap-3 col-10 col-md-6 mx-auto">
            <button class="btn btn-light btn-lg fw-bold py-3 shadow-lg" onclick="window.startFishing()">Start Session</button>
            <div class="row g-2">
                <div class="col-6"><button class="btn btn-outline-light w-100 py-3" onclick="window.loadSavedScorecards()" data-bs-toggle="modal" data-bs-target="#savedModal">History</button></div>
                <div class="col-6"><button class="btn btn-outline-light w-100 py-3" onclick="window.loadStatsDashboard()" data-bs-toggle="modal" data-bs-target="#statsModal">My Stats</button></div>
            </div>
        </div>
        
        <button id="btnRefreshApp" class="btn btn-link text-white-50 text-decoration-none mt-4 small" onclick="window.forceAppUpdate()"><i id="refreshIcon" class="bi bi-arrow-clockwise me-1"></i> Check for Updates</button>
        <div class="mt-4 pt-3 small fw-bold text-uppercase" style="color: #64748b;">Created by C.O.T.H. Enterprises 2026</div>
    </div>

    <div id="anglerRegistration" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-3">

            <button class="btn btn-sm btn-outline-secondary px-3 rounded-pill" onclick="window.resetAppToHome()">Back</button>

        <div class="inner-card p-3 mb-2">

                <div class="col-6"><label class="form-label small mb-1">Date</label><input type="date" id="competitionDate" class="form-control"></div>
                <div class="col-6"><label class="form-label small mb-1">Venue</label><input type="text" id="venueInput" class="form-control border-primary" placeholder="Location Name"></div>

        <div class="inner-card p-3 mb-2">

    <script>
        const KEY = "db7f2afb64d943719e0203116260103";
        const speciesList = [
            {category:"Common",items:["Cod","Pollack","Coalfish","Whiting","Dab","Flounder","Plaice","Dogfish (LSD)","Bull Huss"]},
            {category:"Round Fish",items:["Bass","Garfish","Mackerel","Mullet","Scad","Weever"]},
            {category:"Flatfish",items:["Brill","Megrim","Sole","Topknot"]},
            {category:"Other",items:["Ray","Wrasse","Smoothhound","Squid","Other"]}
        ];
        
        let fishData=[], currentScoringMethod='', selectedWeightUnit='metric', currentSavedKey='', currentAngler='', currentVenue='', currentDate='';
        let weatherStamp = '', windStamp = '';

        const PageManager={ show:id=>{ document.querySelectorAll('.app-page').forEach(p=>p.style.display='none'); document.getElementById('splashScreen').style.display='none'; document.getElementById(id).style.display='block'; window.scrollTo(0,0); } };
        const StorageHelper={ save:(k,v)=>localStorage.setItem(k,v), get:k=>localStorage.getItem(k), remove:k=>localStorage.removeItem(k), getAll:()=>({...localStorage}) };

        window.showToast = (m, e=false) => {
            const t = document.getElementById('appToast'); document.getElementById('toastMsg').innerText = m;
            t.className = e ? 'toast text-bg-warning border-0 shadow-lg' : 'toast text-bg-success border-0 shadow-lg';
            new bootstrap.Toast(t).show();
        };

        window.toggleDarkMode = () => { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light'); };
        window.forceAppUpdate = () => { sessionStorage.setItem('upd','t'); window.location.reload(); };

        window.fetchWeatherOnly = async () => {
            const v = document.getElementById('venueInput').value.trim();
            const btn = document.querySelector('button[onclick="window.fetchWeatherOnly()"]');
            btn.innerHTML = '<i class="bi bi-hourglass-split icon-spin"></i> Fetching...';
            
            const executeFetch = async (query) => {
                try {
                    const res = await fetch(`https://api.weatherapi.com/v1/current.json?key=${KEY}&q=${query}`).then(r=>r.json());
                    if(res.error) throw new Error(res.error.message);
                    weatherStamp = `${res.current.condition.text}, ${res.current.temp_c}°C`;
                    windStamp = `${res.current.wind_dir} ${res.current.wind_mph}mph`;
                    document.getElementById('weatherOut').value = weatherStamp;
                    document.getElementById('windOut').value = windStamp;
                    window.showToast("Conditions Loaded!");
                } catch(err) { window.showToast(err.message, true); }
                btn.innerHTML = 'Fetch Conditions';
            };

            if(v !== "") { executeFetch(encodeURIComponent(v)); }
            else {
                navigator.geolocation.getCurrentPosition(
                    pos => executeFetch(`${pos.coords.latitude},${pos.coords.longitude}`),
                    err => { window.showToast("Enter Venue Name!", true); btn.innerHTML = 'Fetch Conditions'; }
                );
            }
        };

        window.startFishing = () => { document.getElementById("competitionDate").value = new Date().toISOString().split('T')[0]; PageManager.show('anglerRegistration'); };
        window.toggleCompetitionFields = () => { const c = document.getElementById('isCompetition').checked; document.getElementById('zoneInput').disabled = !c; document.getElementById('pegInput').disabled = !c; };
        window.handleMethodChange = () => { if(document.getElementById("scoringMethod").value==='weight') bootstrap.Modal.getOrCreateInstance(document.getElementById('weightUnitModal')).show(); };
        window.handleUnitChoice = u => { selectedWeightUnit = u; };

        window.registerAngler = () => {
            currentAngler=document.getElementById('anglerName').value; currentVenue=document.getElementById('venueInput').value; currentScoringMethod=document.getElementById('scoringMethod').value;
            if(!currentAngler||!currentVenue||!currentScoringMethod) return alert("Fill setup!");
            window.setupPickers(); PageManager.show('anglerFishingPage');
        };

        window.setupPickers = () => {
            const isW = currentScoringMethod==='weight'; document.getElementById('weightPickerContainer').style.display=isW?'block':'none'; document.getElementById('lengthPickerContainer').style.display=isW?'none':'block';
            const sp=document.getElementById('speciesInput'); sp.innerHTML='<option value="" disabled selected>Fish...</option>';
            speciesList.forEach(g=>{ const gr=document.createElement('optgroup'); gr.label=g.category; g.items.forEach(s=>gr.appendChild(new Option(s,s))); sp.appendChild(gr); });
            const pad = '<div style="height:65px"></div>'; let hL1=pad, hL2=pad, hW1=pad, hW2=pad;
            for(let i=0;i<=5;i++) hL1+=`<div class="picker-item" data-val="${i}">${i}</div>`;
            for(let i=0;i<=99;i++) hL2+=`<div class="picker-item" data-val="${i}">${i.toString().padStart(2,'0')}</div>`;
            for(let i=0;i<=50;i++) hW1+=`<div class="picker-item" data-val="${i}">${i}</div>`;
            for(let i=0;i<=950;i+=50) hW2+=`<div class="picker-item" data-val="${i/1000}">${(i/1000).toFixed(3).split('.')[1]}</div>`;
            document.getElementById('pickerLenCol1').innerHTML=hL1+pad; document.getElementById('pickerLenCol2').innerHTML=hL2+pad;
            document.getElementById('pickerCol1').innerHTML=hW1+pad; document.getElementById('pickerCol2').innerHTML=hW2+pad;
            setTimeout(()=>['pickerLenCol1','pickerLenCol2','pickerCol1','pickerCol2'].forEach(id=>window.updatePickerDisplay(id)), 100);
        };

        window.updatePickerDisplay = id => { const el=document.getElementById(id); if(!el)return; const mid=el.scrollTop+90; el.querySelectorAll('.picker-item').forEach(it=>{ if(it.offsetTop<=mid && (it.offsetTop+50)>=mid) it.classList.add('selected'); else it.classList.remove('selected'); }); };
        window.triggerCamera = () => document.getElementById('cameraInput').click();
        window.handleCameraInput = () => { const fr=new FileReader(); fr.onload=e=>{ const img=new Image(); img.onload=()=>{ const can=document.createElement('canvas'); const ctx=can.getContext('2d'); const M=400; let w=img.width,h=img.height; if(w>h){if(w>M){h*=M/w;w=M;}}else{if(h>M){w*=M/h;h=M;}} can.width=w;can.height=h;ctx.drawImage(img,0,0,w,h); window.addFish(can.toDataURL('image/jpeg',0.5)); }; img.src=e.target.result; }; fr.readAsDataURL(document.getElementById('cameraInput').files[0]); };

        window.addFishTextOnly = () => window.addFish(null);
        window.addFish = ph => {
            const s=document.getElementById('speciesInput').value; if(!s) return alert("Select Fish!");
            let v=0,d=''; if(currentScoringMethod==='weight'){ const v1=parseFloat(document.querySelector('#pickerCol1 .selected').dataset.val), v2=parseFloat(document.querySelector('#pickerCol2 .selected').dataset.val); v=v1+v2; d=v.toFixed(3)+'kg'; }
            else { const v1=parseFloat(document.querySelector('#pickerLenCol1 .selected').dataset.val), v2=parseFloat(document.querySelector('#pickerLenCol2 .selected').dataset.val); v=(v1*100)+v2; d=v+'cm'; }
            fishData.push({species:s, val:v, disp:d, photo:ph, time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}); window.updateFishLog();
        };

        window.updateFishLog = () => {
            document.getElementById('fishLog').innerHTML = fishData.slice().reverse().map((f,i)=>`<tr><td><div class="d-flex justify-content-between align-items-center"><div><strong>${f.species}</strong><br><small class="text-primary fw-bold">${f.disp}</small></div>${f.photo?`<img src="${f.photo}" class="fish-thumb" onclick="window.viewImg('${f.photo}')">`:''}<button class="btn btn-sm text-danger" onclick="fishData.splice(${fishData.length-1-i},1);window.updateFishLog();"><i class="bi bi-trash"></i></button></div></td></tr>`).join('');
            let score = fishData.reduce((a,b)=>a+b.val,0); document.getElementById('liveScoreVal').innerText = currentScoringMethod==='weight'?score.toFixed(3)+'kg':score+'cm';
        };

        window.endSession = () => {
            if(!confirm("End?"))return; PageManager.show('tallyVerificationPage');
            document.getElementById('session_angler').innerText=currentAngler; document.getElementById('session_venue').innerText=currentVenue; document.getElementById('session_date').innerText=new Date().toLocaleDateString('en-GB');
            document.getElementById('session_total_points').innerText=document.getElementById('liveScoreVal').innerText; document.getElementById('session_total_fish').innerText=fishData.length;
            const sysNotes = weatherStamp ? `SYSTEM: ${weatherStamp} | ${windStamp}\n` : '';
            const key = 'scorecard_'+Date.now(); const rec = { angler:currentAngler, venue:currentVenue, date:new Date(), fishData, method:currentScoringMethod, notes:'' };
            StorageHelper.save(key, JSON.stringify(rec));
            document.getElementById('sessionNotesInput').oninput = e => { rec.notes = sysNotes + e.target.value; StorageHelper.save(key, JSON.stringify(rec)); };
        };

        window.loadSaved = () => {
            const ks=Object.keys(localStorage).filter(k=>k.startsWith('scorecard_')).sort().reverse();
            document.getElementById('recentList').innerHTML=ks.map(k=>{ const d=JSON.parse(localStorage.getItem(k)); return `<div class="inner-card" onclick="window.viewRec('${k}')">${d.venue} - ${d.angler}<br><small>${new Date(d.date).toLocaleDateString('en-GB')}</small></div>`; }).join('') || 'No History';
        };

        window.viewImg = s => { document.getElementById('fullSizeImage').src=s; new bootstrap.Modal(document.getElementById('imageModal')).show(); };
        document.addEventListener('DOMContentLoaded', ()=>{ if(localStorage.getItem('theme')==='dark')window.toggleDarkMode(); if(sessionStorage.getItem('upd')) { sessionStorage.removeItem('upd'); window.showToast("App Updated!"); } });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
