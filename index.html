<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sea Score Pro</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-dark: #0f172a; 
            --app-blue: #0ea5e9; 
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            --card-bg: #ffffff;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            color: #1e293b; 
            padding-bottom: 90px;
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior-y: contain; /* Prevents pull-to-refresh reload */
        }
        
        h1, h2, h3, h4, .btn, .modal-title { font-family: 'Poppins', sans-serif; }

        /* --- WEIGHT DRUM PICKER --- */
        .picker-outer-wrapper {
            background: #ffffff;
            padding: 15px;
            border-radius: 24px;
            border: 2px solid var(--app-blue);
            margin-bottom: 20px;
            box-shadow: var(--shadow-lg);
        }
        .picker-instruction {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--app-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .weight-picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
            border-radius: 16px;
            height: 180px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }
        .picker-column {
            flex: 1;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            text-align: center;
            -ms-overflow-style: none;
            scrollbar-width: none;
            z-index: 2;
            overscroll-behavior-y: contain;
            user-select: none;
            touch-action: pan-y;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        .picker-item {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 600;
            color: #cbd5e1;
            scroll-snap-align: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .picker-item.selected {
            color: var(--primary-dark);
            font-size: 2.2rem;
            font-weight: 800;
        }
        .picker-highlight {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 54px;
            background: rgba(14, 165, 233, 0.08);
            border-top: 2px solid var(--app-blue);
            border-bottom: 2px solid var(--app-blue);
            pointer-events: none;
            z-index: 1;
            border-radius: 12px;
        }
        .picker-label-text {
            font-size: 0.8rem;
            font-weight: 900;
            color: var(--app-blue);
            position: absolute;
            bottom: 8px;
            text-transform: uppercase;
        }

        /* --- BUTTONS --- */
        .btn-record-action {
            white-space: normal !important;
            line-height: 1.1 !important;
            font-size: 0.85rem !important;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px !important;
            border-radius: 20px;
        }

        .app-page { display: none; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px 15px 40px 15px; }
        .inner-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: var(--shadow-md); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.8); }

        .splash-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #334155 100%); color: white;
            text-align: center; padding: 20px;
        }
        .logo-svg { width: 140px; height: 140px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); margin-bottom: 30px; }
        .radar-sweep { transform-origin: 100px 100px; animation: scan 4s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .live-score-box { border: 4px solid var(--app-blue); background-color: white; border-radius: 24px; padding: 20px; text-align: center; margin-bottom: 25px; box-shadow: var(--shadow-lg); }
        .live-score-value { font-size: 4.5rem; font-weight: 800; color: var(--primary-dark); line-height: 1; }

        .fish-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; float: right; margin-left: 12px; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .table-custom td { background: white; padding: 18px; border-radius: 18px; vertical-align: middle; border: 1px solid #e2e8f0; box-shadow: var(--shadow-md); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #ffffff; padding: 15px 5px; border-radius: 16px; text-align: center; border: 1px solid #f1f5f9; box-shadow: var(--shadow-md); }
        .stat-card small { display: block; color: #64748b; font-size: 0.7rem; text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
        .stat-card strong { font-size: 1.1rem; color: #1e293b; font-weight: 800; }
        
        .species-quota-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; box-shadow: var(--shadow-md); }
        .pip { width: 38px; height: 38px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; background: #f1f5f9; color: #94a3b8; margin-right: 6px; }
        .pip.active.bronze { background: #d97706; color: white; }
        .pip.active.silver { background: #94a3b8; color: white; }
        .pip.active.gold { background: #eab308; color: white; }

        @keyframes slideFlash { 0% { background-color: #dcfce7; transform: translateY(-10px); } 100% { background-color: white; } }
        .new-catch-anim { animation: slideFlash 1.5s ease-out; }
    </style>
</head>
<body>

    <div id="splashScreen" class="splash-screen">
        <svg class="logo-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="90" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="10,5"/>
            <circle cx="100" cy="100" r="65" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
            <circle cx="100" cy="100" r="40" fill="#0ea5e9"/>
            <path d="M75,100 Q90,80 115,85 Q130,90 135,100 Q130,110 115,115 Q90,120 75,100" fill="white"/>
            <g class="radar-sweep"><line x1="100" y1="100" x2="160" y2="40" stroke="#10b981" stroke-width="5" stroke-linecap="round"/><circle cx="160" cy="40" r="6" fill="#10b981"/></g>
        </svg>
        <h1 class="display-3 fw-bold mb-0">Sea Score</h1>
        <p class="text-uppercase tracking-widest opacity-50 small mb-4">Version 126.0 - Pro</p>
        <div class="d-grid gap-3 col-10 col-md-6">
            <button class="btn btn-light btn-lg fw-bold py-3 shadow-lg" onclick="window.startFishing()">Start Session</button>
            <button class="btn btn-outline-light btn-lg py-3" onclick="window.loadSavedScorecards()" data-bs-toggle="modal" data-bs-target="#savedModal">History</button>
            <button class="btn btn-link text-white text-decoration-none opacity-50 small mt-2" onclick="window.forceUpdateApp()">
                <i class="bi bi-arrow-clockwise"></i> Force Update / Clear Cache
            </button>
        </div>
    </div>

    <div id="anglerRegistration" class="app-page">
        <h2 class="fw-bold mb-4 text-primary">Session Setup</h2>
        <div class="inner-card">
            <div class="mb-3"><label class="form-label">Angler Name</label><input type="text" id="anglerName" class="form-control form-control-lg" placeholder="Enter Name" oninput="window.saveActiveSession()"></div>
            <div class="row g-3">
                <div class="col-6"><label class="form-label">Date</label><input type="date" id="competitionDate" class="form-control form-control-lg" onchange="window.saveActiveSession()"></div>
                <div class="col-6"><label class="form-label">Venue</label><input type="text" id="venueInput" class="form-control form-control-lg" placeholder="Location" oninput="window.saveActiveSession()"></div>
            </div>
        </div>
        <div class="inner-card">
            <label class="form-label text-primary">Scoring Rules</label>
            <select id="scoringMethod" class="form-select form-select-lg" onchange="window.handleMethodChange()">
                <option value="" disabled selected>Select Scoring Method...</option>
                <option value="measure_points">Length + 10 Pts</option>
                <option value="length_only">Total Length Only</option>
                <option value="species_hunt">Species Hunt (3=100pts)</option>
                <option value="weight">Total Weight</option>
            </select>
            <div id="speciesHuntInfo" class="mt-3 small text-muted" style="display:none;">1st: 30 | 2nd: 30 | 3rd: 40 | 4th+: 1pt</div>
            <div id="weightInfoDisplay" class="mt-3 small fw-bold text-success" style="display:none;"></div>
        </div>
        <div class="inner-card">
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="isCompetition" onchange="window.toggleCompetitionFields(); window.saveActiveSession();">
                <label class="form-check-label fw-bold" for="isCompetition">Competition Mode</label>
            </div>
            <div class="row g-3">
                <div class="col-6"><input type="text" id="zoneInput" class="form-control" placeholder="Zone" disabled oninput="window.saveActiveSession()"></div>
                <div class="col-6"><input type="number" id="pegInput" class="form-control" placeholder="Peg" disabled oninput="window.saveActiveSession()"></div>
            </div>
        </div>
        <button class="btn btn-primary btn-lg w-100 py-3 shadow mt-3" onclick="window.registerAngler()">Begin Session <i class="bi bi-arrow-right ms-2"></i></button>
    </div>

    <div id="anglerFishingPage" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="m-0 fw-bold text-primary">Live Catch</h4>
            <button class="btn btn-sm btn-outline-danger px-3 rounded-pill" onclick="window.confirmQuit()">Quit</button>
        </div>
        
        <div class="inner-card">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="window.handleCameraInput()">
            <div class="mb-4">
                <label class="form-label">Species</label>
                <select id="speciesInput" class="form-select form-select-lg" onchange="window.toggleCustomSpeciesInput()"></select>
                <input type="text" id="customSpeciesInput" class="form-control form-control-lg mt-2" placeholder="Species Name" style="display:none;">
            </div>

            <div id="lengthInputContainer" class="mb-4">
                <label class="form-label">Length (cm)</label>
                <input type="number" id="lengthInput" class="form-control form-control-lg" placeholder="0">
            </div>

            <div id="weightPickerContainer" class="mb-4" style="display:none;">
                <div class="picker-outer-wrapper">
                    <div class="picker-instruction"><i class="bi bi-hand-index-thumb me-1"></i> Swipe Wheels to Set Weight</div>
                    <div class="weight-picker-container">
                        <div class="picker-highlight"></div>
                        <div id="pickerCol1" class="picker-column" onscroll="window.updatePickerDisplay('pickerCol1')"></div>
                        <div id="pickerCol2" class="picker-column" onscroll="window.updatePickerDisplay('pickerCol2')"></div>
                        <div class="picker-label-text" style="left: 20%;" id="label1">KG</div>
                        <div class="picker-label-text" style="right: 20%;" id="label2">G</div>
                    </div>
                </div>
            </div>

            <div class="row g-2 pt-2 border-top">
                <div class="col-6"><button class="btn btn-primary btn-record-action w-100 shadow-sm" onclick="window.addFishTextOnly()"><i class="bi bi-check-circle fs-3 mb-2"></i>Record Fish</button></div>
                <div class="col-6"><button class="btn btn-primary btn-record-action w-100 shadow-sm" onclick="window.triggerCamera()"><i class="bi bi-camera-fill fs-3 mb-2"></i>With Photo</button></div>
            </div>
        </div>

        <div class="live-score-box">
            <div class="small text-muted text-uppercase fw-bold mb-1">Session Total</div>
            <div class="live-score-value" id="liveScoreVal">0</div>
        </div>

        <div class="table-responsive"><table class="table-custom"><tbody id="fishLog"></tbody></table></div>
        <button class="btn btn-danger btn-lg w-100 mt-4 py-3 shadow" onclick="window.endSession()">Finish Session</button>
    </div>

    <div id="tallyVerificationPage" class="app-page">
        <div class="inner-card text-center py-4">
            <h2 class="text-primary fw-bold">Match Complete</h2>
            <div id="session_angler" class="fw-bold fs-4"></div>
            <div class="text-muted"><span id="session_date"></span> • <span id="session_venue"></span></div>
        </div>
        <div class="live-score-box"><div id="session_total_points" class="live-score-value">0</div></div>
        <div class="stat-grid">
            <div class="stat-card"><strong>Fish</strong><div id="session_total_fish">0</div></div>
            <div class="stat-card"><strong>Species</strong><div id="session_species_count">0</div></div>
            <div class="stat-card"><strong id="session_stat_label">Stat</strong><div id="session_total_stat">0</div></div>
        </div>
        <div id="session_breakdown_area"></div>
        <div class="inner-card">
            <label class="form-label small">Session Notes</label>
            <textarea id="sessionNotesInput" class="form-control" rows="2" oninput="window.saveActiveSession()"></textarea>
        </div>
        <div class="d-grid gap-3 mt-4">
            <button class="btn btn-primary btn-lg shadow py-3" onclick="window.saveAndEndSession()">Save Record</button>
            <button class="btn btn-whatsapp py-3 shadow-sm" onclick="window.shareAsImage('live')">Share Summary</button>
        </div>
    </div>

    <div class="modal fade" id="savedModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-scrollable"><div class="modal-content border-0"><div class="modal-header border-0"><h5 class="modal-title fw-bold">History</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body bg-light"><div id="savedScorecardsList"><div id="recentList"></div></div><div id="fullScorecardView" style="display:none;"><h4 id="saved_view_angler" class="text-primary fw-bold text-center"></h4><div id="saved_view_points" class="live-score-value text-center my-4"></div><div id="saved_view_breakdown"></div><div class="d-grid gap-2 mt-4"><button class="btn btn-danger py-3" onclick="window.deleteCurrentSaved()">Delete</button><button class="btn btn-secondary py-3" onclick="window.backToScorecardList()">Back</button></div></div></div></div></div></div>
    
    <div class="modal fade" id="weightUnitModal" tabindex="-1" data-bs-backdrop="static" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-body p-5 text-center">
                    <h4>Scoring Unit</h4>
                    <p class="text-muted small mb-4">Choose format for this session</p>
                    <div class="d-grid gap-3">
                        <button type="button" class="btn btn-primary btn-lg py-3" data-bs-dismiss="modal" onclick="window.handleUnitChoice('metric')">Kilograms (KG)</button>
                        <button type="button" class="btn btn-primary btn-lg py-3" data-bs-dismiss="modal" onclick="window.handleUnitChoice('imperial')">Pounds & Ounces</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="restoreSessionModal" tabindex="-1" data-bs-backdrop="static"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg"><div class="modal-body text-center p-5"><h4>Resume Session?</h4><p class="text-muted">Restore unfinished session for <strong id="restoreAnglerName"></strong>?</p><div class="d-grid gap-2 mt-4"><button class="btn btn-primary btn-lg py-3" data-bs-dismiss="modal" onclick="window.confirmRestore()">Resume Fishing</button><button class="btn btn-outline-secondary py-3" data-bs-dismiss="modal" onclick="window.discardRestore()">Start New</button></div></div></div></div></div>

    <div class="modal fade" id="imageModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content" style="background:transparent; border:none;"><div class="modal-body p-0 text-center"><img id="fullSizeImage" src="" style="max-width:100%; border-radius:15px; border:3px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"><button class="btn btn-sm btn-light mt-3 rounded-pill px-4" data-bs-dismiss="modal">Close</button></div></div></div></div>

    <script>
        const speciesList=[
            {category:"Common",items:["Cod","Pollack","Coalfish","Whiting","Dab","Flounder","Plaice","Turbot","Dogfish (LSD)","Bull Huss"]},
            {category:"Round Fish",items:["Bass","Bream (Black)","Bream (Gilthead)","Bream (Red)","Garfish","Gurnard (Grey)","Gurnard (Red)","Gurnard (Tub)","Mackerel","Mullet (Golden)","Mullet (Grey/Thick)","Mullet (Red)","Scad","Weever (Lesser)"]},
            {category:"Flatfish",items:["Brill","Megrim","Sole (Dover)","Sole (Lemon)","Topknot"]},
            {category:"Sharks & Rays",items:["Dogfish (Blackmouth)","Smoothhound (Common)","Smoothhound (Starry)","Spurdog","Tope","Ray (Thornback)","Ray (Spotted)","Ray (Blonde)","Ray (Small-eyed)","Ray (Stingray)"]},
            {category:"Wrasse & Mini",items:["Wrasse (Ballan)","Wrasse (Corkwing)","Wrasse (Cuckoo)","Wrasse (Goldsinny)","Rockling (3-Bearded)","Rockling (Shore)","Blenny (Common)","Goby (Rock)","Poor Cod","Pouting (Bib)","Scorpion Fish","Squid"]}
        ];
        let fishData=[], currentScoringMethod='', selectedWeightUnit='metric', currentSavedKey='', currentAngler='', currentVenue='', currentDate='';

        const PageManager={show:function(id){document.querySelectorAll('.app-page').forEach(p=>p.style.display='none');document.getElementById('splashScreen').style.display='none';document.getElementById(id).style.display='block';window.scrollTo(0,0)}};
        const StorageHelper={save:(k,v)=>localStorage.setItem(k,v),get:(k)=>localStorage.getItem(k),remove:(k)=>localStorage.removeItem(k),getAll:()=>({...localStorage})};

        /* --- PROGRAMMATIC UPDATER --- */
        window.forceUpdateApp = function() {
            if (confirm("This will clear the app cache and reload to the newest version. Proceed?")) {
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        for (let name of names) caches.delete(name);
                    });
                }
                if (window.navigator && navigator.serviceWorker) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        for(let registration of registrations) registration.unregister();
                    });
                }
                window.location.reload(true);
            }
        };

        /* --- PICKER ENGINE --- */
        window.initWeightPicker = function() {
            const c1 = document.getElementById('pickerCol1'), c2 = document.getElementById('pickerCol2');
            const pad = '<div class="picker-item"></div><div class="picker-item"></div>';
            let h1 = pad, h2 = pad;
            if(selectedWeightUnit==='metric'){
                for(let i=0;i<=50;i++) h1+=`<div class="picker-item" data-val="${i}">${i}</div>`;
                for(let i=0;i<=950;i+=50) h2+=`<div class="picker-item" data-val="${i/1000}">${(i/1000).toFixed(3).split('.')[1]}</div>`;
                document.getElementById('label1').textContent='KG'; document.getElementById('label2').textContent='G';
            } else {
                for(let i=0;i<=60;i++) h1+=`<div class="picker-item" data-val="${i}">${i}</div>`;
                for(let i=0;i<=15;i++) h2+=`<div class="picker-item" data-val="${i}">${i}</div>`;
                document.getElementById('label1').textContent='LB'; document.getElementById('label2').textContent='OZ';
            }
            c1.innerHTML=h1+pad; c2.innerHTML=h2+pad;
            setTimeout(()=>{ window.updatePickerDisplay('pickerCol1'); window.updatePickerDisplay('pickerCol2'); }, 200);
        };

        window.updatePickerDisplay = function(id) {
            const el = document.getElementById(id), items = el.querySelectorAll('.picker-item');
            const mid = el.scrollTop + 90;
            items.forEach(it => {
                if(it.offsetTop < mid && it.offsetTop+50 > mid) it.classList.add('selected');
                else it.classList.remove('selected');
            });
        };

        window.getPickerValue = function() {
            const v1 = parseFloat(document.querySelector('#pickerCol1 .selected')?.dataset.val || 0);
            const v2 = parseFloat(document.querySelector('#pickerCol2 .selected')?.dataset.val || 0);
            const rawVal = selectedWeightUnit === 'metric' ? (v1 + v2) : (v1 * 16) + v2;
            const dispVal = selectedWeightUnit === 'metric' ? `${(v1 + v2).toFixed(3)}kg` : `${v1}lb ${v2}oz`;
            return { raw: rawVal, display: dispVal };
        };

        /* --- APP CORE --- */
        window.handleMethodChange = function() {
            const m = document.getElementById("scoringMethod").value;
            if(m === 'weight') {
                bootstrap.Modal.getOrCreateInstance(document.getElementById('weightUnitModal')).show();
            } else {
                document.getElementById('weightInfoDisplay').style.display='none';
            }
            document.getElementById('speciesHuntInfo').style.display = m==='species_hunt' ? 'block':'none';
            window.saveActiveSession();
        };

        window.handleUnitChoice = function(unit) {
            selectedWeightUnit = unit;
            
            // Update the display text underneath the dropdown safely
            const infoDisplay = document.getElementById('weightInfoDisplay');
            if (infoDisplay) {
                infoDisplay.style.display = 'block';
                infoDisplay.innerHTML = `<i class="bi bi-check-circle-fill me-1"></i> Format: ${unit==='metric' ? 'Kilograms (KG/G)' : 'Pounds (LB/OZ)'}`;
            }

            window.saveActiveSession();
        };

        window.registerAngler = function() {
            currentAngler = document.getElementById('anglerName').value.trim();
            currentVenue = document.getElementById('venueInput').value.trim();
            currentDate = document.getElementById('competitionDate').value;
            currentScoringMethod = document.getElementById('scoringMethod').value;
            if(!currentAngler || !currentVenue || !currentScoringMethod) return alert("Please fill all setup fields.");
            
            document.getElementById('weightPickerContainer').style.display = currentScoringMethod==='weight' ? 'block':'none';
            document.getElementById('lengthInputContainer').style.display = (currentScoringMethod==='weight' || currentScoringMethod==='species_hunt') ? 'none':'block';
            if(currentScoringMethod==='weight') window.initWeightPicker();
            
            window.populateSpeciesDropdown();
            PageManager.show('anglerFishingPage');
            window.saveActiveSession();
        };

        window.validateInputs = function() {
            const spIn = document.getElementById('speciesInput');
            let species = spIn.value === "Other" ? document.getElementById('customSpeciesInput').value.trim() : spIn.value;
            if(!species) { alert("Select species."); return null; }
            if(currentScoringMethod==='weight') return { species, ...window.getPickerValue() };
            if(currentScoringMethod==='species_hunt') return { species, length: 0 };
            const len = parseFloat(document.getElementById('lengthInput').value||0);
            if(len <= 0) { alert("Enter length."); return null; }
            return { species, length: len };
        };

        window.addFishTextOnly = function() {
            const d = window.validateInputs();
            if(d) { fishData.push(d); window.updateFishLog(); window.saveActiveSession(); }
        };

        window.triggerCamera = function() { if(window.validateInputs()) document.getElementById('cameraInput').click(); };

        window.handleCameraInput = function() {
            const input = document.getElementById('cameraInput');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        const MAX = 600; let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } } else { if (h > MAX) { w *= MAX/h; h = MAX; } }
                        canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                        const photoData = canvas.toDataURL('image/jpeg', 0.6);
                        const d = window.validateInputs();
                        if(d) { fishData.push({ ...d, photo: photoData }); finishAddAction(); }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
            input.value = '';
        };

        function finishAddAction() {
            window.updateFishLog();
            const firstRow = document.querySelector('#fishLog tr:first-child');
            if(firstRow) firstRow.classList.add('new-catch-anim');
            document.getElementById("speciesInput").value = ""; document.getElementById("customSpeciesInput").value = ""; document.getElementById("lengthInput").value = "";
            window.toggleCustomSpeciesInput(); window.saveActiveSession();
        }

        window.calculatePoints = function(data, method){
            if(method==='weight') {
                const totalRaw = data.reduce((sum, f) => sum + (parseFloat(f.raw) || 0), 0);
                if(selectedWeightUnit==='metric') return totalRaw.toFixed(3);
                return Math.floor(totalRaw/16) + 'lb ' + (totalRaw % 16).toFixed(0) + 'oz';
            }
            if(method==='species_hunt'){
                const counts={}; let pts=0;
                data.forEach(f => { counts[f.species]=(counts[f.species]||0)+1; const n=counts[f.species]; pts+=(n===1?30:n===2?30:n===3?40:1); });
                return pts;
            }
            const lenSum = data.reduce((s,f)=>s+parseFloat(f.length||0), 0);
            return method==='length_only' ? Math.round(lenSum) : Math.round(lenSum + (data.length*10));
        };

        window.updateFishLog = function(){
            const log = document.getElementById('fishLog'); log.innerHTML='';
            [...fishData].reverse().forEach(f=>{
                const tr = document.createElement('tr');
                const val = currentScoringMethod==='weight' ? f.display : `${f.length}cm`;
                const ph = f.photo ? `<img src="${f.photo}" class="fish-thumb" onclick="window.viewImg('${f.photo}')">` : '';
                tr.innerHTML = `<td><div class="fw-bold text-dark">${f.species}</div><div class="text-primary fw-bold small">${val}</div></td><td>${ph}</td><td class="text-end"><button class="btn btn-sm text-danger border-0" onclick="window.delFish(${fishData.indexOf(f)})"><i class="bi bi-trash"></i></button></td>`;
                log.appendChild(tr);
            });
            document.getElementById('liveScoreVal').textContent = window.calculatePoints(fishData, currentScoringMethod);
        };

        window.endSession = function(){
            PageManager.show('tallyVerificationPage');
            document.getElementById('session_angler').textContent = currentAngler;
            document.getElementById('session_date').textContent = new Date(currentDate).toLocaleDateString('en-GB');
            document.getElementById('session_venue').textContent = currentVenue;
            document.getElementById('session_total_points').textContent = window.calculatePoints(fishData, currentScoringMethod);
            document.getElementById('session_total_fish').textContent = fishData.length;
            document.getElementById('session_species_count').textContent = new Set(fishData.map(f=>f.species)).size;
            
            const isW = currentScoringMethod==='weight';
            document.getElementById('session_stat_label').textContent = isW ? 'Total Weight' : 'Total Length';
            document.getElementById('session_total_stat').textContent = isW ? window.calculatePoints(fishData, 'weight') + (selectedWeightUnit==='metric'?'kg':'') : fishData.reduce((s,f)=>s+parseFloat(f.length||0),0).toFixed(1) + 'cm';
            
            const area = document.getElementById('session_breakdown_area'); area.innerHTML='';
            if(currentScoringMethod==='species_hunt'){
                const c={}; fishData.forEach(f=>counts[f.species]=(counts[f.species]||0)+1);
                for(let s in c){
                    let p=0, pips=''; for(let i=1;i<=3;i++){ const a=c[s]>=i?'active':''; const v=(i<3?30:40); if(c[s]>=i)p+=v; pips+=`<span class="pip bronze ${a}">${v}</span>`; }
                    area.innerHTML+=`<div class="species-quota-card"><strong>${s}</strong>: ${p}pts<br>${pips}</div>`;
                }
            } else {
                fishData.forEach(f=>area.innerHTML+=`<div class="inner-card p-2 mb-2 border shadow-sm">${f.species}: ${f.display||f.length+'cm'}</div>`);
            }
            window.saveActiveSession();
        };

        window.saveAndEndSession = function(){
            StorageHelper.save('scorecard_'+Date.now(), JSON.stringify({angler:currentAngler, venue:currentVenue, date:currentDate, fishData, method:currentScoringMethod, weightUnit:selectedWeightUnit, notes:document.getElementById('sessionNotesInput').value }));
            StorageHelper.remove('active_session'); location.reload();
        };

        window.loadSavedScorecards = function(){
            const list = document.getElementById('recentList'); list.innerHTML='';
            const keys = Object.keys(StorageHelper.getAll()).filter(k=>k.startsWith('scorecard_')).sort().reverse();
            keys.forEach(k=>{
                const d = JSON.parse(StorageHelper.get(k));
                list.innerHTML+=`<div class="inner-card shadow-sm mb-3" onclick="window.viewSaved('${k}')"><strong>${d.venue}</strong><br><small>${new Date(d.date).toLocaleDateString('en-GB')} • ${window.calculatePoints(d.fishData, d.method)} pts</small></div>`;
            });
        };

        window.viewSaved = function(k){
            currentSavedKey = k; const d = JSON.parse(StorageHelper.get(k));
            document.getElementById('saved_view_angler').textContent = d.angler;
            document.getElementById('saved_view_points').textContent = window.calculatePoints(d.fishData, d.method);
            const area = document.getElementById('saved_view_breakdown'); area.innerHTML='';
            if(d.method==='species_hunt'){
                const counts={}; d.fishData.forEach(f=>counts[f.species]=(counts[f.species]||0)+1);
                for(let s in counts){
                    let pips=''; for(let i=1;i<=3;i++){ const a=counts[s]>=i?'active':''; pips+=`<span class="pip bronze ${a}">${i<3?30:40}</span>`; }
                    area.innerHTML+=`<div class="species-quota-card"><strong>${s}</strong><br>${pips}</div>`;
                }
            } else {
                d.fishData.forEach(f=>area.innerHTML+=`<div class="p-2 border-bottom">${f.species}: ${f.display||f.length+'cm'}</div>`);
            }
            document.getElementById('savedScorecardsList').style.display='none';
            document.getElementById('fullScorecardView').style.display='block';
        };

        window.saveActiveSession = function(){
            const p = document.getElementById('anglerFishingPage').style.display==='block'?'fishing':(document.getElementById('tallyVerificationPage').style.display==='block'?'tally':'setup');
            StorageHelper.save('active_session', JSON.stringify({ phase:p, angler:currentAngler||document.getElementById('anglerName').value, venue:currentVenue||document.getElementById('venueInput').value, date:currentDate||document.getElementById('competitionDate').value, method:currentScoringMethod, unit:selectedWeightUnit, fishData }));
        };

        window.restoreActiveSession = function(){
            const s = JSON.parse(StorageHelper.get('active_session'));
            if(s && (s.angler || s.fishData.length > 0)){
                document.getElementById('restoreAnglerName').textContent = s.angler || "Unnamed";
                bootstrap.Modal.getOrCreateInstance(document.getElementById('restoreSessionModal')).show();
            }
        };

        window.confirmRestore = function(){
            const s = JSON.parse(StorageHelper.get('active_session')); fishData=s.fishData||[]; currentAngler=s.angler; currentVenue=s.venue; currentDate=s.date; currentScoringMethod=s.method; selectedWeightUnit=s.unit;
            document.getElementById('anglerName').value=s.angler; document.getElementById('venueInput').value=s.venue; document.getElementById('scoringMethod').value=s.method;
            window.populateSpeciesDropdown();
            if(s.phase==='fishing'){ window.initWeightPicker(); PageManager.show('anglerFishingPage'); window.updateFishLog(); }
            else if(s.phase==='tally'){ window.endSession(); }
            else { PageManager.show('anglerRegistration'); }
        };

        window.populateSpeciesDropdown = function() {
            const e = document.getElementById('speciesInput'); e.innerHTML='<option value="" selected disabled>Select Fish...</option><option value="Other">Other (Manual Entry)</option>';
            speciesList.forEach(g => {
                const grp = document.createElement('optgroup'); grp.label = g.category;
                g.items.sort().forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; grp.appendChild(o); }); e.appendChild(grp);
            });
        };

        window.toggleCustomSpeciesInput=function(){document.getElementById("customSpeciesInput").style.display=document.getElementById("speciesInput").value==="Other"?"block":"none";};
        window.confirmQuit=function(){if(confirm("Discard session?")){StorageHelper.remove('active_session');location.reload();}};
        window.discardRestore=function(){StorageHelper.remove('active_session');location.reload();};
        window.backToScorecardList=function(){document.getElementById("fullScorecardView").style.display="none";document.getElementById("savedScorecardsList").style.display="block";};
        window.deleteCurrentSaved=function(){if(confirm("Delete record?")){StorageHelper.remove(currentSavedKey); location.reload();}};
        window.delFish=function(i){if(confirm("Delete catch?")){fishData.splice(i,1); window.updateFishLog(); window.saveActiveSession();}};
        window.viewImg=function(s){document.getElementById('fullSizeImage').src=s; bootstrap.Modal.getOrCreateInstance(document.getElementById('imageModal')).show();};
        window.startFishing=function(){PageManager.show('anglerRegistration');};
        window.toggleCompetitionFields=function(){const isC=document.getElementById('isCompetition').checked; document.getElementById('zoneInput').disabled=!isC; document.getElementById('pegInput').disabled=!isC;};
        
        window.shareAsImage=function(id){
            const el = document.getElementById(id==='live'?'tallyVerificationPage':'fullScorecardView');
            const btns = el.querySelectorAll('button'); btns.forEach(b=>b.style.display='none');
            html2canvas(el, {backgroundColor:'#f1f5f9'}).then(canvas=>{
                btns.forEach(b=>b.style.display='inline-block');
                const link = document.createElement('a'); link.download='seascore.png'; link.href=canvas.toDataURL(); link.click();
            });
        };

        document.addEventListener('DOMContentLoaded', window.restoreActiveSession);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
